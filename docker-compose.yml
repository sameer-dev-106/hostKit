services:
  backend:
    build: ./Backend
    ports:
      - "3000:3000"
    volumes:
      - ./Backend:/app
      - backend_node_modules:/app/node_modules
    env_file:
      - ./Backend/.env
    depends_on:
      - redis
    command: npx nodemon -L server.js

  worker:
    build: ./Backend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ./Backend/.env
    depends_on:
      - redis

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

volumes:
  backend_node_modules: